name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out what you can.

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g., macOS 15.3 Sequoia
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: What's affected?
      options:
        - Terminal dashboard (claude-status.sh)
        - Menubar app (Claude Status.app)
        - Dashboard launcher (Claude Dashboard.app)
        - Build script (build.sh)
        - Install script (install.sh)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened...

  - type: textarea
    id: logs
    attributes:
      label: Terminal output / error messages
      render: shell
      placeholder: Paste any error output here...
