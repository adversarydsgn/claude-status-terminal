name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      placeholder: Describe your idea...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why?
      placeholder: What problem does this solve for you?
